name: Scheduled posts

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Post task to generate"
        type: choice
        required: true
        default: all
        options:
          - all
          - hn-top10
          - asia-market-daily
          - crypto-market-daily
          - us-market-daily
      date:
        description: "Archive date in Asia/Shanghai, YYYY-MM-DD. Empty = today or scheduled offset."
        required: false
        type: string
      force:
        description: "Overwrite an existing post for the same date"
        required: false
        type: boolean
        default: false
      ai_model:
        description: "Optional AI_MODEL override. Empty = repository secret/default."
        required: false
        type: string
  schedule:
    # 22:00 Asia/Shanghai: A股 + 港股 after local market close.
    - cron: "0 14 * * *"
    # 01:00 Asia/Shanghai next day: digital assets snapshot for previous BJT date.
    - cron: "0 17 * * *"
    # 06:30 Asia/Shanghai next day: US market after regular close, archived to previous BJT date.
    - cron: "30 22 * * *"

concurrency:
  group: scheduled-posts-${{ github.ref }}-${{ github.event.inputs.task || github.event.schedule || 'all' }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate scheduled posts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "📝 Generate posts"
        env:
          INPUT_TASK: ${{ github.event.inputs.task || '' }}
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
          INPUT_FORCE: ${{ github.event.inputs.force || 'false' }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ github.event.inputs.ai_model || secrets.AI_MODEL }}
        run: |
          set -euo pipefail
          task="$INPUT_TASK"
          date_offset="0"
          if [ -z "$task" ]; then
            case "$EVENT_SCHEDULE" in
              "0 14 * * *") task="asia-market-daily" ;;
              "0 17 * * *") task="crypto-market-daily"; date_offset="-1" ;;
              "30 22 * * *") task="us-market-daily"; date_offset="-1" ;;
              *) task="all" ;;
            esac
          fi
          args=(--task "$task" --ai --artifacts-dir blog-generation-artifacts)
          if [ -n "$INPUT_DATE" ]; then
            args+=(--date "$INPUT_DATE")
          elif [ "$date_offset" != "0" ]; then
            args+=(--date-offset "$date_offset")
          fi
          if [ -n "$AI_MODEL" ]; then
            args+=(--model "$AI_MODEL")
          fi
          if [ "$INPUT_FORCE" = "true" ]; then
            args+=(--force)
          fi
          node --import tsx scripts/generate_scheduled_post.ts "${args[@]}" --result-json scheduled-posts-result.json
          cat scheduled-posts-result.json

      - name: "📦 Upload generation artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheduled-posts-generation-artifacts
          path: |
            scheduled-posts-result.json
            blog-generation-artifacts/
          if-no-files-found: ignore

      - name: "🔎 Verify generated post contract"
        run: node --import tsx scripts/verify_blog_generation.ts --result-json scheduled-posts-result.json

      - name: "🧹 Format generated posts"
        run: pnpm exec prettier --write "src/content/posts/zh-cn/*.md"

      - name: "🔎 Check whether content changed"
        id: diff
        run: |
          if [ -z "$(git status --porcelain -- src/content/posts data)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          git status --short

      - name: "🚀 Build the project"
        run: pnpm run build

      - name: "🚢 Commit generated posts"
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts data
          git commit -m "feat(posts): archive scheduled posts"
          git push origin "HEAD:${GITHUB_REF_NAME}"
