name: Manual Blog Publishing

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Post task to generate. Valid values are defined in scripts/blog_tasks.ts; use all or daily-digests for grouped runs."
        type: string
        required: true
        default: hn-top10
      date:
        description: "Archive date in Asia/Shanghai, YYYY-MM-DD. Empty = today or scheduled offset."
        required: false
        type: string
      event_schedule:
        description: "Optional cron string to reuse scheduled date/segment mapping."
        required: false
        type: string
      market_segment:
        description: "capital-market-daily only: which segment to generate (us | asia | crypto). asia also builds the market table."
        required: false
        type: string
      force:
        description: "Overwrite an existing post for the same date"
        required: false
        type: boolean
        default: false
      ai_model:
        description: "Optional AI_MODEL override. Empty = repository secret/default."
        required: false
        type: string
      podcast_max_episodes:
        description: "Final daily-podcasts safety cap after merging Apple Top 5 + 5 foreign tech episodes. Empty = 10."
        required: false
        type: string

jobs:
  publish:
    name: Publish selected blog task
    permissions:
      contents: write
    uses: ./.github/workflows/blog-publish.yml
    with:
      task: ${{ inputs.task }}
      date: ${{ inputs.date || '' }}
      event_schedule: ${{ inputs.event_schedule || '' }}
      market_segment: ${{ inputs.market_segment || '' }}
      force: ${{ inputs.force || false }}
      ai_model: ${{ inputs.ai_model || '' }}
      podcast_max_episodes: ${{ inputs.podcast_max_episodes || '10' }}
      install_ffmpeg: ${{ inputs.task == 'daily-podcasts' || inputs.task == 'xyzrank-top-episodes' || inputs.task == 'all' }}
      install_market_deps: ${{ inputs.task == 'capital-market-daily' || inputs.task == 'all' }}
    secrets: inherit
