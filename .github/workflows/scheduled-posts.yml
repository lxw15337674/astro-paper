name: Scheduled posts

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Post task to generate. Valid values are defined in scripts/blog_tasks.ts; use all or daily-digests for grouped runs."
        type: string
        required: true
        default: hn-top10
      date:
        description: "Archive date in Asia/Shanghai, YYYY-MM-DD. Empty = today or scheduled offset."
        required: false
        type: string
      force:
        description: "Overwrite an existing post for the same date"
        required: false
        type: boolean
        default: false
      ai_model:
        description: "Optional AI_MODEL override. Empty = repository secret/default."
        required: false
        type: string
      podcast_max_episodes:
        description: "Maximum foreign podcast episodes, or Apple Top podcast articles. Empty = 1 for foreign podcast and 10 for apple-top-podcasts."
        required: false
        type: string
  schedule:
    # 08:30 Asia/Shanghai every day: classify one global source pool and generate tech/AI/business daily digests.
    - cron: "30 0 * * *"
    # 09:30 Asia/Shanghai: foreign tech podcast note.
    - cron: "30 1 * * *"
    # 11:30 Asia/Shanghai: Apple Podcasts US Top Shows note.
    - cron: "30 3 * * *"
    # 17:30 Asia/Shanghai: Hacker News Top 10 after the US morning discussion window has activity.
    - cron: "30 9 * * *"
    # 18:00 Asia/Shanghai on weekdays: A股 + 港股 after local market close.
    - cron: "0 10 * * 1-5"
    # 01:00 Asia/Shanghai next day: digital assets snapshot for previous BJT date.
    - cron: "0 17 * * *"
    # 06:30 Asia/Shanghai next day: US market after regular close, archived to previous BJT date.
    - cron: "30 22 * * *"
    # 07:00 Asia/Shanghai: GitHub Trending daily project note.
    - cron: "0 23 * * *"

concurrency:
  group: scheduled-posts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate scheduled posts
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Use Python for local Whisper
        if: ${{ github.event.inputs.task == 'foreign-tech-podcast' || github.event.inputs.task == 'apple-top-podcasts' || github.event.inputs.task == 'all' || github.event.schedule == '30 1 * * *' || github.event.schedule == '30 3 * * *' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: .github/workflows/scheduled-posts.yml

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🎧 Install ffmpeg and local Whisper for podcast transcription"
        if: ${{ github.event.inputs.task == 'foreign-tech-podcast' || github.event.inputs.task == 'apple-top-podcasts' || github.event.inputs.task == 'all' || github.event.schedule == '30 1 * * *' || github.event.schedule == '30 3 * * *' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install "openai-whisper==20250625"
          python -m pip show openai-whisper
          whisper --help >/dev/null

      - name: "📝 Generate posts"
        env:
          INPUT_TASK: ${{ github.event.inputs.task || '' }}
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
          INPUT_FORCE: ${{ github.event.inputs.force || 'false' }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ github.event.inputs.ai_model || secrets.AI_MODEL }}
          AI_FALLBACK_API_KEY: ${{ secrets.AI_FALLBACK_API_KEY }}
          AI_FALLBACK_BASE_URL: ${{ secrets.AI_FALLBACK_BASE_URL || 'https://api.deepseek.com' }}
          AI_FALLBACK_MODEL: ${{ secrets.AI_FALLBACK_MODEL || 'deepseek-v4-flash' }}
          GITHUB_TOKEN: ${{ github.token }}
          PODCAST_TRANSCRIBE_PROVIDER: local
          PODCAST_WHISPER_MODEL: base.en
          AI_TIMEOUT_MS: 600000
          PODCAST_PROMPT_TRANSCRIPT_CHARS: 8000
          PODCAST_AUDIO_DOWNLOAD_TIMEOUT_MS: 120000
          PODCAST_MAX_EPISODES: ${{ github.event.inputs.podcast_max_episodes || '1' }}
          PODCAST_MIN_EPISODES: 1
          PODCAST_CANDIDATE_EPISODES: 8
          APPLE_TOP_PODCASTS_COUNT: 10
          APPLE_TOP_PODCASTS_MAX_EPISODES: ${{ github.event.inputs.podcast_max_episodes || '10' }}
          APPLE_TOP_PODCASTS_MIN_EPISODES: 1
          APPLE_TOP_PODCASTS_CANDIDATE_EPISODES: 10
          APPLE_TOP_PODCASTS_SKIP_ON_INSUFFICIENT: true
          APPLE_TOP_PODCASTS_TRANSCRIBE_DELAY_MS: 15000
          PODCAST_FFMPEG_TIMEOUT_MS: 120000
        run: |
          set -euo pipefail
          args=(--ai --artifacts-dir blog-generation-artifacts)
          if [ -n "$INPUT_TASK" ]; then
            args+=(--task "$INPUT_TASK")
          fi
          if [ -n "$INPUT_DATE" ]; then
            args+=(--date "$INPUT_DATE")
          fi
          if [ -n "$AI_MODEL" ]; then
            args+=(--model "$AI_MODEL")
          fi
          if [ "$INPUT_FORCE" = "true" ]; then
            args+=(--force)
          fi
          node --import tsx scripts/generate_scheduled_post.ts "${args[@]}" --result-json scheduled-posts-result.json
          cat scheduled-posts-result.json

      - name: "📦 Upload generation artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheduled-posts-generation-artifacts
          path: |
            scheduled-posts-result.json
            blog-generation-artifacts/
          if-no-files-found: ignore

      - name: "🧾 Summarize generation result"
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f scheduled-posts-result.json ]; then
            echo "### Scheduled posts" >> "$GITHUB_STEP_SUMMARY"
            echo "scheduled-posts-result.json was not produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const payload = JSON.parse(fs.readFileSync("scheduled-posts-result.json", "utf8"));
          const lines = ["### Scheduled posts", "", `Archive date: ${payload.date || "unknown"}`, "", "| Task | Status | Path | Detail |", "| --- | --- | --- | --- |"];
          for (const item of payload.results || []) {
            const status = item.failed ? "failed" : item.skipped ? "skipped" : item.created ? "created" : "updated";
            const detail = String(item.error || item.skip_reason || item.title || "")
              .replaceAll("|", "\\|")
              .replaceAll("\r", " ")
              .replaceAll("\n", " ");
            lines.push(`| ${item.task || "unknown"} | ${status} | ${item.path || "-"} | ${detail} |`);
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          NODE

      - name: "🔎 Verify generated post contract"
        env:
          PODCAST_MIN_EPISODES: 1
        run: node --import tsx scripts/verify_blog_generation.ts --result-json scheduled-posts-result.json

      - name: "🧹 Format generated posts"
        run: pnpm exec prettier --write "src/content/posts/zh-cn/*.md"

      - name: "🔎 Check whether content changed"
        id: diff
        run: |
          if [ -z "$(git status --porcelain -- src/content/posts data)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          git status --short

      - name: "🚀 Build the project"
        run: pnpm run build

      - name: "🚢 Commit generated posts"
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts data
          git commit -m "feat(posts): archive scheduled posts"
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "push attempt ${attempt}/3 failed; retrying after remote refresh"
            sleep $((attempt * 5))
          done
          echo "failed to push generated posts after 3 attempts" >&2
          exit 1

      - name: "🚨 Report generation failures"
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f scheduled-posts-result.json ]; then
            echo "scheduled-posts-result.json was not produced"
            exit 0
          fi
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const payload = JSON.parse(fs.readFileSync("scheduled-posts-result.json", "utf8"));
          const failures = (payload.results || []).filter((item) => item.failed);
          if (!failures.length) {
            console.log("No task-level generation failures.");
            process.exit(0);
          }
          console.error("Task-level generation failures:");
          for (const item of failures) console.error(`- ${item.task}: ${item.error}`);
          process.exit(1);
          NODE
