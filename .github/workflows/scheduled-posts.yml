name: Scheduled posts

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Post task to generate"
        type: choice
        required: true
        default: all
        options:
          - all
          - hn-top10
          - global-market-daily
      date:
        description: "Archive date in Asia/Shanghai, YYYY-MM-DD. Empty = today."
        required: false
        type: string
      force:
        description: "Overwrite an existing post for the same date"
        required: false
        type: boolean
        default: false
      ai_model:
        description: "Optional AI_MODEL override. Empty = repository secret/default."
        required: false
        type: string
  schedule:
    # 17:30 Asia/Shanghai. GitHub schedules use UTC and may be delayed.
    - cron: "30 9 * * *"

concurrency:
  group: scheduled-posts-${{ github.ref }}-${{ github.event.inputs.task || 'all' }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate scheduled posts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "📝 Generate posts"
        env:
          TASK: ${{ github.event.inputs.task || 'all' }}
          DATE: ${{ github.event.inputs.date || '' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ github.event.inputs.ai_model || secrets.AI_MODEL }}
        run: |
          set -euo pipefail
          args=(--task "$TASK" --ai --artifacts-dir blog-generation-artifacts)
          if [ -n "$DATE" ]; then
            args+=(--date "$DATE")
          fi
          if [ -n "$AI_MODEL" ]; then
            args+=(--model "$AI_MODEL")
          fi
          if [ "$FORCE" = "true" ]; then
            args+=(--force)
          fi
          python3 scripts/generate_scheduled_post.py "${args[@]}" | tee scheduled-posts-result.json

      - name: "📦 Upload generation artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-posts-generation-artifacts
          path: |
            scheduled-posts-result.json
            blog-generation-artifacts/
          if-no-files-found: ignore

      - name: "🔎 Verify generated post contract"
        run: python3 scripts/verify_blog_generation.py --result-json scheduled-posts-result.json

      - name: "🔎 Check whether content changed"
        id: diff
        run: |
          if [ -z "$(git status --porcelain -- src/content/posts data)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          git status --short

      - name: "🚀 Build the project"
        run: pnpm run build

      - name: "🚢 Commit generated posts"
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts data
          git commit -m "feat(posts): archive scheduled posts"
          git push origin "HEAD:${GITHUB_REF_NAME}"
