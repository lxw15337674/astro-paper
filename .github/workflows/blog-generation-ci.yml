name: Blog generation CI

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    paths:
      - ".github/workflows/blog-generation-ci.yml"
      - ".github/workflows/scheduled-posts.yml"
      - "docs/blog-cron-*.md"
      - "docs/hn-cron-pipeline.md"
      - "prompts/blog/**"
      - "scripts/**"
      - "skills/software-development/astro-paper-*-cron/**"
      - "tests/**"
  workflow_dispatch:
  workflow_call:

jobs:
  verify:
    name: Verify blog generation contracts
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v7

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🧪 Run TypeScript pipeline tests"
        run: pnpm run test:blog

      - name: "🔎 Type-check TypeScript scripts"
        run: pnpm run typecheck

      - name: "📝 Verify offline AI blog generation contract"
        run: |
          node --import tsx scripts/generate_scheduled_post.ts \
            --task all \
            --date 2099-01-02 \
            --force \
            --ai \
            --source-fixture-dir tests/fixtures/blog-sources \
            --mock-response-dir tests/fixtures/blog-ai-responses \
            --artifacts-dir blog-generation-artifacts \
            | tee blog-generation-result.json
          node --import tsx scripts/verify_blog_generation.ts --result-json blog-generation-result.json

      - name: "🚀 Build generated blog output"
        run: pnpm run build
