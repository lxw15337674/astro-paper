name: Blog generation CI

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    paths:
      - ".github/workflows/blog-generation-ci.yml"
      - ".github/workflows/scheduled-posts.yml"
      - "docs/blog-cron-*.md"
      - "docs/hn-cron-pipeline.md"
      - "prompts/blog/**"
      - "scripts/**"
      - "skills/software-development/astro-paper-*-cron/**"
      - "tests/**"
  workflow_dispatch:
  workflow_call:

jobs:
  verify:
    name: Verify blog generation contracts
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🐍 Install Python test dependencies"
        run: python3 -m pip install pytest

      - name: "🧪 Run Python pipeline tests"
        run: python3 -m pytest tests

      - name: "📝 Verify offline AI blog generation contract"
        run: |
          python3 scripts/generate_scheduled_post.py \
            --task all \
            --date 2099-01-02 \
            --force \
            --ai \
            --source-fixture-dir tests/fixtures/blog-sources \
            --mock-response-dir tests/fixtures/blog-ai-responses \
            --artifacts-dir blog-generation-artifacts \
            | tee blog-generation-result.json
          python3 scripts/verify_blog_generation.py --result-json blog-generation-result.json

      - name: "🚀 Build generated blog output"
        run: pnpm run build
