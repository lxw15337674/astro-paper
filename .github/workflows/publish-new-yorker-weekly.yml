name: Publish New Yorker Weekly

permissions:
  contents: write

on:
  schedule:
    - cron: "0 5 * * 6"
  workflow_dispatch:
    inputs:
      date:
        description: "Archive date in Asia/Shanghai, YYYY-MM-DD. Empty = today."
        required: false
        type: string
      force:
        description: "Overwrite an existing post for the same date"
        required: false
        type: boolean
        default: false
      ai_model:
        description: "Optional AI_MODEL override. Empty = repository secret/default."
        required: false
        type: string

jobs:
  publish:
    name: Publish New Yorker weekly guide
    permissions:
      contents: write
    uses: ./.github/workflows/blog-publish.yml
    with:
      task: new-yorker-weekly
      date: ${{ inputs.date || '' }}
      event_schedule: ${{ github.event.schedule || '0 5 * * 6' }}
      force: ${{ inputs.force || false }}
      ai_model: ${{ inputs.ai_model || '' }}
    secrets: inherit
