name: Site Quality Gate

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_call:

jobs:
  build:
    name: Lint, format, and build site
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7

      - name: "Install pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Lint source"
        run: pnpm run lint

      - name: "Check formatting"
        run: pnpm run format:check

      - name: "Build site"
        run: pnpm run build
